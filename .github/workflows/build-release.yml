name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install watchdog pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name kb-guardian --add-data "config.ini;." kb_guardian/main.py

      - name: Package artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version.StartsWith("v")) { $version = "dev" }
          $zipName = "kb-guardian-windows-$version.zip"
          Compress-Archive -Path dist\kb-guardian\* -DestinationPath $zipName
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Write-Output "ZIP: $zipName"
          Write-Output "SHA256: $hash"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-guardian-windows
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          body: |
            ## KB-Guardian ${{ github.ref_name }}

            ### Windows Build
            | File | SHA256 |
            |------|--------|
            | `${{ env.ZIP_NAME }}` | `${{ env.SHA256 }}` |

            ### 安裝說明
            1. 解壓縮 ZIP 到任意目錄
            2. 編輯 `_internal\config.ini` 設定路徑
            3. 執行 `kb-guardian.exe`

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          pip install watchdog pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --noconfirm --onedir --windowed --name kb-guardian \
            --add-data "config.ini:." kb_guardian/main.py

      - name: Package artifact
        run: |
          VERSION="${{ github.ref_name }}"
          [ "${VERSION#v}" = "${VERSION}" ] && VERSION="dev"
          ZIP_NAME="kb-guardian-linux-${VERSION}.zip"
          zip -r "${ZIP_NAME}" dist/kb-guardian/
          SHA256=$(sha256sum "${ZIP_NAME}" | cut -d' ' -f1)
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "SHA256=${SHA256}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-guardian-linux
          path: ${{ env.ZIP_NAME }}

      - name: Append to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
